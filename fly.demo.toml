# =============================================
# Fly.io app config — Pull API v2 DEMO (Aurora Hall, cuenta de Diego)
# Deploy (deliberado, nunca por defecto):
#   flyctl deploy -c fly.demo.toml --remote-only
# Este archivo se llamaba fly.toml; se renombró a propósito para que
# `flyctl deploy` a secas FALLE en vez de deployar a la demo sin querer.
# Entornos reales de 511 Events: fly.staging.toml y fly.prod.toml.
# Ver ENVIRONMENTS.md en la raíz del workspace.
# =============================================
app = "pull-api-v2-demo"
primary_region = "dfw"   # Dallas — closest active region to Guatemala (mia deprecated)

[build]

[env]
  PORT = "8080"
  # production a propósito: la demo es pública y necesita el comportamiento
  # de seguridad de production (cookies secure, errores opacos, etc.).
  ENVIRONMENT = "production"
  DEMO_MODE = "true"
  # Autoriza la combinación production+demo SOLO aquí (ver fail-safe en
  # main.go). Prod y staging no deben definir esta variable jamás.
  ALLOW_DEMO_MODE = "true"
  COOKIE_SAMESITE = "None"
  RESEND_FROM_EMAIL = "Pull Events <noreply@tickets.pullevents.com>"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
